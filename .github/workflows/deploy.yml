name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the OIDC Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; cancel any superseded run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # All actions pin Node 24 (avoids the Node 20 deprecation on Actions runners).
      - uses: actions/checkout@v7
      # Bun matches the local toolchain (bun.lock). Frozen install for CI reproducibility.
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build
        # Project page -> https://minggliangg.github.io/margin/
        # An absolute base is required (not './') so code-split chunks resolve.
        run: bun run build
        env:
          VITE_BASE: /margin/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
